<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — Anvil</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body{background:#09090b;color:#f4f4f5}</style>
</head>
<body class="h-full flex items-center justify-center bg-zinc-950">

  <!-- Subtle grid background -->
  <div class="fixed inset-0 pointer-events-none"
       style="background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:48px 48px"></div>

  <div class="relative w-full max-w-sm px-4">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-orange-500/15 border border-orange-500/25 text-3xl mb-4 shadow-lg shadow-orange-500/10">⚒</div>
      <h1 class="text-2xl font-bold tracking-wide text-white uppercase" style="letter-spacing:0.2em">Anvil</h1>
      <p class="text-sm text-zinc-500 mt-1">Hash cracking platform</p>
    </div>

    <!-- Card -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl shadow-black/50 space-y-4">
      {% if error %}
      <div class="flex items-center gap-2.5 px-3 py-2.5 bg-red-500/10 border border-red-500/25 text-red-300 rounded-lg text-sm">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label for="username" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username"
                 class="w-full bg-zinc-800 border border-zinc-700 text-zinc-100 placeholder-zinc-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="w-full bg-zinc-800 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
        </div>

        <button type="submit"
                class="w-full mt-2 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all"
                style="background:rgba(99,102,241,0.30);color:#c7d2fe;border:1px solid rgba(99,102,241,0.5);"
                onmouseover="this.style.background='rgba(99,102,241,0.42)';this.style.borderColor='rgba(99,102,241,0.7)'"
                onmouseout="this.style.background='rgba(99,102,241,0.30)';this.style.borderColor='rgba(99,102,241,0.5)'">
          Sign in
        </button>
      </form>
    </div>

  </div>
</body>
</html>
